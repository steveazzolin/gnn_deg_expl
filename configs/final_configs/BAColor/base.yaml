includes:
  - ../base.yaml
model:
  backbone: GIN
  model_layer: 3
  global_pool: sum
  dim_hidden: 100
  dim_ffn: 100
  dropout_rate: 0.0
train:
  num_steps: 10
  max_epoch: 100
  train_bs: 64
  val_bs: 512
  test_bs: 512
  weight_decay: 0.
  lr_filternode: 0.
dataset:
  dataset_name: BAColor
  domain: basis
  generate: false
average_edge_attn: mean
mitigation_sampling: raw
mitigation_readout: weighted
