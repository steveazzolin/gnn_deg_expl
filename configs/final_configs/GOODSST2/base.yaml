includes:
  - ../base.yaml
model:
  backbone: ACR
  model_layer: 3
  gnn_clf_layer: 0
  dim_hidden: 300
  dim_ffn: 300
  dropout_rate: 0.5
train:
  num_steps: 10
  mile_stones: [150]
  max_epoch: 200
  train_bs: 512
  val_bs: 1024
  test_bs: 1024
  lr: 0.001
  weight_decay: 0.
use_norm: none
average_edge_attn: mean
mitigation_sampling: raw
mitigation_readout: weighted